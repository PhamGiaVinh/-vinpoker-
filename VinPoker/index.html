      }
      @media (prefers-reduced-motion: reduce) {

    <script>
      // Boot watchdog: if React doesn't mount within 8s, show a Reload button
      // inside the splash so users aren't stuck on a black screen after a
      // failed update / chunk-load failure in installed PWAs.
      (function () {
        var booted = false;
        window.addEventListener('vp:react-mounted', function () { booted = true; });
        window.setTimeout(function () {
          if (booted) return;
          var splash = document.getElementById('boot-splash');
          if (!splash) return;
          // If we just updated and React still cannot mount, do one silent
          // recovery pass first: remove stale service workers/caches, then
          // reload with a fresh URL. This fixes installed PWAs stuck on an old
          // cached shell before the visible retry button is even needed.
          try {
            if (sessionStorage.getItem('vp:just-updated') &&
                !sessionStorage.getItem('vp:auto-reloaded')) {
              sessionStorage.setItem('vp:auto-reloaded', '1');
              var autoCaches = 'caches' in window
                ? caches.keys().then(function (keys) {
                    return Promise.all(keys.map(function (name) { return caches.delete(name); }));
                  }).catch(function () {})
                : Promise.resolve();
              var autoWorkers = 'serviceWorker' in navigator
                ? navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                    .then(function (reg) { return reg.update().catch(function () {}).then(function () { return reg; }); })
                    .then(function (reg) {
                      try { reg.waiting && reg.waiting.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
                      try { reg.active && reg.active.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
                      return navigator.serviceWorker.getRegistrations().then(function (regs) {
                        return Promise.all(regs.map(function (r) { return r.unregister(); }));
                      });
                    }).catch(function () {})
                : Promise.resolve();
              Promise.all([autoCaches, autoWorkers]).finally(function () {
                var url = new URL(location.href);
                url.searchParams.delete('_v');
                url.searchParams.set('recover', Date.now().toString());
                location.replace(url.toString());
              });
              return;
            }
          } catch (e) {}
          var btn = document.createElement('button');
          btn.id = 'boot-retry';
          btn.textContent = 'Tải lại / Reload';
          btn.style.cssText = 'position:absolute;bottom:14%;left:50%;transform:translateX(-50%);' +
            'padding:12px 28px;border-radius:9999px;border:1px solid rgba(255,255,255,.2);' +
            'background:#3b82f6;color:#fff;font:600 14px system-ui,-apple-system,sans-serif;cursor:pointer;' +
            'box-shadow:0 8px 24px rgba(59,130,246,.35)';
          btn.onclick = function () {
            btn.disabled = true;
            btn.textContent = 'Đang tải lại...';
            btn.style.opacity = '.85';
            var clearCaches = 'caches' in window
              ? caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (name) { return caches.delete(name); }));
                }).catch(function () {})
              : Promise.resolve();
            var clearWorkers = 'serviceWorker' in navigator
              ? navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                  .then(function (reg) { return reg.update().catch(function () {}).then(function () { return reg; }); })
                  .then(function (reg) {
                    try { reg.waiting && reg.waiting.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
                    try { reg.active && reg.active.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
                    return navigator.serviceWorker.getRegistrations().then(function (regs) {
                      return Promise.all(regs.map(function (r) { return r.unregister(); }));
                    });
                  }).catch(function () {})
              : Promise.resolve();
            try {
              sessionStorage.removeItem('vp:auto-reloaded');
              sessionStorage.removeItem('vp:just-updated');
            } catch (e) {}
            Promise.all([clearCaches, clearWorkers]).finally(function () {
              var url = new URL(location.href);
              url.searchParams.delete('_v');
              url.searchParams.set('recover', Date.now().toString());
              location.replace(url.toString());
            });
          };
          splash.appendChild(btn);
          var hint = document.createElement('div');
          hint.textContent = 'Không thể tải ứng dụng. Vui lòng bấm Tải lại.';
          hint.style.cssText = 'position:absolute;bottom:24%;left:0;right:0;text-align:center;' +
            'color:rgba(255,255,255,.7);font:500 13px system-ui,-apple-system,sans-serif;padding:0 24px';
          splash.appendChild(hint);
        }, 8000);
      })();
    </script>
