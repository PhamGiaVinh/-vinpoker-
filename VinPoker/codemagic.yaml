# Codemagic CI/CD — VBacker (Capacitor mobile app)
# This repo is a monorepo: the Capacitor app lives in the VinPoker/ folder,
# and this codemagic.yaml sits inside it. In Codemagic set:
#   Path to project: VinPoker
#   Branch:          agent/capacitor-shell
# Scripts use absolute $CM_BUILD_DIR paths so they work regardless of the
# build's working directory.
#
# Owner quick start (non-technical):
#   1. Sign up at codemagic.io with the GitHub account that owns this repo.
#   2. Add this repository. When asked for the monorepo path, type: VinPoker
#   3. Pick branch agent/capacitor-shell, then run the `android-debug` workflow.
#   4. Codemagic emails an installable APK to the address below. Download it on
#      an Android phone and install (allow "unknown sources").
#   The `ios-release` workflow only works AFTER Apple Developer signing is
#   connected in Codemagic — leave it alone until then.

workflows:
  # ---------------------------------------------------------------------------
  # Android debug APK — works immediately, NO signing/accounts required.
  # ---------------------------------------------------------------------------
  android-debug:
    name: VBacker — Android debug APK
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 20
      vars:
        VERCEL: "1" # skip the Playwright Chromium download in postinstall
    scripts:
      - name: Install dependencies
        script: |
          cd "$CM_BUILD_DIR/VinPoker"
          npm ci --no-audit --no-fund
      - name: Build web (Vite)
        script: |
          cd "$CM_BUILD_DIR/VinPoker"
          npm run build
      - name: Capacitor sync (Android)
        script: |
          cd "$CM_BUILD_DIR/VinPoker"
          npx cap sync android
      - name: Build debug APK
        script: |
          cd "$CM_BUILD_DIR/VinPoker/android"
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - VinPoker/android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - zadvietnam2010@gmail.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # iOS App Store build — TEMPLATE. Requires connecting in Codemagic first:
  #   - App Store Connect API key integration named "VBacker App Store Connect"
  #   - bundle id app.vbacker registered in the Apple Developer portal
  # Capacitor 7 iOS uses Swift Package Manager; exact steps may need a small
  # tweak once signing is connected. Do not trigger until ready.
  # ---------------------------------------------------------------------------
  ios-release:
    name: VBacker — iOS App Store (needs Apple signing)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: VBacker App Store Connect
    environment:
      node: 20
      vars:
        VERCEL: "1"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.vbacker
    scripts:
      - name: Install dependencies
        script: |
          cd "$CM_BUILD_DIR/VinPoker"
          npm ci --no-audit --no-fund
      - name: Build web (Vite)
        script: |
          cd "$CM_BUILD_DIR/VinPoker"
          npm run build
      - name: Capacitor sync (iOS)
        script: |
          cd "$CM_BUILD_DIR/VinPoker"
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR/VinPoker/ios/App"
          xcode-project build-ipa --project App.xcodeproj --scheme App
    artifacts:
      - VinPoker/ios/App/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zadvietnam2010@gmail.com
