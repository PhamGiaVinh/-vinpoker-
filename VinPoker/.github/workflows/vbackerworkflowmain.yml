name: Deploy to Production

# Workflow consolidated into user's first self-created workflow file.
# Triggers: push to main/master, or manual dispatch via Actions tab.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_db:
        description: "Run `supabase db push --linked` (DANGEROUS — owner-approved DB migration deploy ONLY). Leave false for a normal deploy."
        type: boolean
        default: false

# Only the LATEST deploy to main wins. When several PRs merge close together, every
# push triggers its own `vercel --prod` deploy; without this they ran in parallel and
# the production alias could get pinned to an OLDER commit (the race that left prod on a
# stale build even though every workflow reported "success"). cancel-in-progress stops
# the older in-flight deploys so production always lands on the newest commit.
# ⚠️ Owner-approved DB-migration deploys (workflow_dispatch + deploy_db=true) must be run
# in a QUIET window with no concurrent merges — a later push can cancel an in-flight run
# in this group, which would interrupt `supabase db push`. (DB deploys are already done in
# controlled windows per VinPoker/CLAUDE.md, so this matches existing practice.)
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./VinPoker

      - name: Type check
        run: npm run type-check
        continue-on-error: true
        working-directory: ./VinPoker

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # DB migrations are NEVER auto-applied. `supabase db push` runs ONLY on an
      # explicit owner-approved manual run (workflow_dispatch with deploy_db=true).
      # A normal push to main SKIPS this step entirely — no db push. `continue-on-error`
      # is intentionally removed: when an owner explicitly opts in, a push failure MUST
      # surface (not be silently swallowed). See VinPoker/CLAUDE.md migration-safety rules.
      - name: Deploy database migrations (manual, owner-approved only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_db == true }}
        run: supabase db push --linked
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy process-swing --no-verify-jwt
          supabase functions deploy assign-dealer --no-verify-jwt
          supabase functions deploy close-table --no-verify-jwt
          supabase functions deploy swing-metrics --no-verify-jwt
          supabase functions deploy process-swing-on-dealer-ready --no-verify-jwt
          supabase functions deploy run-dealer-ready-backup --no-verify-jwt
          supabase functions deploy process-pre-announce-jobs --no-verify-jwt
          supabase functions deploy online-poker-action --no-verify-jwt
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./VinPoker
