name: Deploy to Production

# Workflow consolidated into user's first self-created workflow file.
# Triggers: push to main/master, or manual dispatch via Actions tab.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./VinPoker

      - name: Type check
        run: npm run type-check
        continue-on-error: true
        working-directory: ./VinPoker

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy database migrations
        run: supabase db push --linked
        working-directory: ./VinPoker
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy process-swing --no-verify-jwt
          supabase functions deploy assign-dealer --no-verify-jwt
          supabase functions deploy close-table --no-verify-jwt
          supabase functions deploy swing-metrics --no-verify-jwt
          supabase functions deploy process-swing-on-dealer-ready --no-verify-jwt
          supabase functions deploy run-dealer-ready-backup --no-verify-jwt
          supabase functions deploy process-pre-announce-jobs --no-verify-jwt
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./VinPoker
