name: Sensitive credential context guard

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "scripts/**"
      - "VinPoker/scripts/**"
  push:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "scripts/**"
      - "VinPoker/scripts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reject-sensitive-vars-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject vars context for credentials
        run: node VinPoker/scripts/security/check-sensitive-credential-context.mjs
