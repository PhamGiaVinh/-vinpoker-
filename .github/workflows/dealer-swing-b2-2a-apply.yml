name: Dealer Swing B2.2a apply — lock fencing DB foundation (one-shot, owner-gated)

# Manual trigger only. Default run = DRY preflight (read-only). To APPLY, type the confirm
# phrase. Applies the additive, idempotent migration 20261003000000 via the Management API
# using the GitHub Secret token (never a chat-pasted token). No db push, no deploy_db, no
# schema_migrations write. Delete this workflow + script after the apply is verified.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY_LOCK_FENCING_B22A to APPLY. Leave empty for a read-only dry preflight."
        required: false
        default: ""

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run B2.2a controlled apply (preflight always; apply only on confirm)
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          CONFIRM_B22A: ${{ inputs.confirm }}
        run: node scripts/dealer-swing/apply_lock_fencing_b22a.mjs
