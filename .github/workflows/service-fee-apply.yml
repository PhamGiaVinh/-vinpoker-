name: Service fee — apply migrations (one-shot, owner-gated)

# Manual trigger only — never runs on push.
# Applies the two reviewed service-fee migrations via the allowlisted runner with a live golden
# before/after diff of get_club_finance_summary. No supabase db push. No deploy_db. No
# schema_migrations write. Delete this file + branch after the apply is verified.
on:
  workflow_dispatch:

jobs:
  apply-service-fee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preflight — read-only
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/finance/apply_service_fee_migrations.mjs --preflight

      - name: Apply — column + RPC v3 with golden before/after diff
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONFIRM_APPLY_SERVICE_FEE: APPLY_SERVICE_FEE_MIGRATIONS
        run: node scripts/finance/apply_service_fee_migrations.mjs --apply
