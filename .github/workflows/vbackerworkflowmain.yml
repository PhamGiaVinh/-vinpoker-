name: Deploy reviewed production source

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Exact 40-character commit SHA already reachable from main"
        required: true
        type: string
      deploy_process_swing:
        description: "Deploy critical Edge function process-swing"
        required: true
        default: false
        type: boolean
      deploy_mass_assign:
        description: "Deploy critical Edge function mass-assign"
        required: true
        default: false
        type: boolean
      deploy_checkout_dealer:
        description: "Deploy critical Edge function checkout-dealer"
        required: true
        default: false
        type: boolean
      deploy_frontend:
        description: "Deploy the reviewed frontend source at commit_sha"
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: production-source
  cancel-in-progress: false

env:
  CRITICAL_ENVIRONMENT: dealer-swing-production-critical
  TARGET_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_sha || github.sha }}

jobs:
  plan:
    name: Validate exact SHA and deployment scope
    runs-on: ubuntu-latest
    outputs:
      critical_functions: ${{ steps.plan.outputs.critical_functions }}
      noncritical_functions: ${{ steps.plan.outputs.noncritical_functions }}
      critical_changed: ${{ steps.plan.outputs.critical_changed }}
      frontend: ${{ steps.plan.outputs.frontend }}
      frontend_held: ${{ steps.plan.outputs.frontend_held }}
      shared_changed: ${{ steps.plan.outputs.shared_changed }}
      target_sha: ${{ steps.plan.outputs.target_sha }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_SHA }}

      - name: Verify manual SHA is immutable and belongs to main
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          sha="${TARGET_SHA}"
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git cat-file -e "${sha}^{commit}"
          git merge-base --is-ancestor "$sha" origin/main
          test "$(git rev-parse "$sha")" = "$sha"

      - name: Build deployment plan
        id: plan
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
          DEPLOY_PROCESS_SWING: ${{ inputs.deploy_process_swing || false }}
          DEPLOY_MASS_ASSIGN: ${{ inputs.deploy_mass_assign || false }}
          DEPLOY_CHECKOUT_DEALER: ${{ inputs.deploy_checkout_dealer || false }}
          DEPLOY_FRONTEND: ${{ inputs.deploy_frontend || false }}
        run: |
          set -euo pipefail
          selected=()
          [[ "$DEPLOY_PROCESS_SWING" == "true" ]] && selected+=("process-swing")
          [[ "$DEPLOY_MASS_ASSIGN" == "true" ]] && selected+=("mass-assign")
          [[ "$DEPLOY_CHECKOUT_DEALER" == "true" ]] && selected+=("checkout-dealer")
          selected_csv="$(IFS=,; echo "${selected[*]-}")"

          node VinPoker/scripts/deploy/plan-edge-deployment.mjs \
            --event "${{ github.event_name }}" \
            --base "$BASE_SHA" \
            --sha "$TARGET_SHA" \
            --selected "$selected_csv" \
            --deploy-frontend "$DEPLOY_FRONTEND" \
            --github-output "$GITHUB_OUTPUT"

      - name: Publish held critical changes
        if: steps.plan.outputs.critical_changed != '[]'
        shell: bash
        env:
          CRITICAL_CHANGED: ${{ steps.plan.outputs.critical_changed }}
        run: |
          echo "Critical Edge source changed and remains dark: ${CRITICAL_CHANGED}"
          echo "Use manual dispatch with this exact reviewed SHA after owner approval."

      - name: Publish held frontend
        if: steps.plan.outputs.frontend_held == 'true'
        run: echo "Frontend remains dark because the same commit contains critical Edge changes."

  quality:
    name: Source quality gate
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./VinPoker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./VinPoker

      - name: Validate deployment control plane
        run: |
          node --test scripts/deploy/*.test.mjs
          node scripts/deploy/validate-control-plane.mjs
          npm run check:credential-context
        working-directory: ./VinPoker

      - name: Lint deployment tooling
        run: npx eslint scripts/deploy/*.mjs
        working-directory: ./VinPoker

  validate-critical-environment:
    name: Require protected critical environment
    if: github.event_name == 'workflow_dispatch' && needs.plan.outputs.critical_functions != '[]'
    needs:
      - plan
      - quality
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed unless required reviewers are configured
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          environment_json="$(gh api "repos/${GITHUB_REPOSITORY}/environments/${CRITICAL_ENVIRONMENT}")"
          jq -e '
            .protection_rules
            | any(.type == "required_reviewers" and ((.reviewers // []) | length > 0))
          ' <<<"$environment_json" >/dev/null

  deploy-critical-edge:
    name: Deploy selected critical Edge functions
    if: github.event_name == 'workflow_dispatch' && needs.plan.outputs.critical_functions != '[]'
    needs:
      - plan
      - quality
      - validate-critical-environment
    runs-on: ubuntu-latest
    environment:
      name: dealer-swing-production-critical
    steps:
      - name: Checkout exact reviewed source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pinned Supabase CLI
        run: npm install --global supabase@2.101.0

      - name: Link Supabase project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Dump live schema for contract probe
        run: supabase db dump --linked --schema public --file "${RUNNER_TEMP}/live-schema.sql"
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Probe live contracts
        run: >-
          node scripts/deploy/probe-live-schema-contracts.mjs
          --schema "${RUNNER_TEMP}/live-schema.sql"
          --targets '${{ needs.plan.outputs.critical_functions }}'
        working-directory: ./VinPoker

      - name: Deploy selected functions with manifest JWT posture
        run: >-
          node scripts/deploy/deploy-selected-edge-functions.mjs
          --targets '${{ needs.plan.outputs.critical_functions }}'
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}

  deploy-noncritical-edge:
    name: Deploy changed noncritical Edge functions
    if: github.event_name == 'push' && needs.plan.outputs.noncritical_functions != '[]'
    needs:
      - plan
      - quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pushed source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pinned Supabase CLI
        run: npm install --global supabase@2.101.0

      - name: Link Supabase project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Dump live schema for contract probe
        run: supabase db dump --linked --schema public --file "${RUNNER_TEMP}/live-schema.sql"
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Probe live contracts
        run: >-
          node scripts/deploy/probe-live-schema-contracts.mjs
          --schema "${RUNNER_TEMP}/live-schema.sql"
          --targets '${{ needs.plan.outputs.noncritical_functions }}'
        working-directory: ./VinPoker

      - name: Deploy changed functions with manifest JWT posture
        run: >-
          node scripts/deploy/deploy-selected-edge-functions.mjs
          --targets '${{ needs.plan.outputs.noncritical_functions }}'
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}

  deploy-frontend:
    name: Deploy exact reviewed frontend
    if: >-
      always() &&
      needs.plan.outputs.frontend == 'true' &&
      needs.quality.result == 'success' &&
      (needs.plan.outputs.critical_functions == '[]' || needs.deploy-critical-edge.result == 'success')
    needs:
      - plan
      - quality
      - deploy-critical-edge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./VinPoker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./VinPoker

      - name: Install pinned deployment CLIs
        run: |
          npm install --global supabase@2.101.0
          npm install --global vercel@latest

      - name: Link Supabase project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Dump live schema for frontend contract probe
        run: supabase db dump --linked --schema public --file "${RUNNER_TEMP}/live-schema.sql"
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Probe frontend live contracts
        run: >-
          node scripts/deploy/probe-live-schema-contracts.mjs
          --schema "${RUNNER_TEMP}/live-schema.sql"
          --targets frontend
        working-directory: ./VinPoker

      - name: Build exact frontend source
        run: npm run build
        working-directory: ./VinPoker
        env:
          VITE_SUPABASE_URL: "https://orlesggcjamwuknxwcpk.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy prebuilt bundle to Vercel
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCELTOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          mkdir -p .vercel/output/static
          cp -r VinPoker/dist/. .vercel/output/static/
          printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
          vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
