name: Deploy to Production

# Workflow consolidated into user's first self-created workflow file.
# Triggers: push to main/master, or manual dispatch via Actions tab.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./VinPoker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./VinPoker

      - name: Type check
        run: npm run lint
        continue-on-error: true
        working-directory: ./VinPoker

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}

      - name: Repair migration history
        run: |
          supabase migration repair --status reverted \
            20260602042631 20260602050206 20260602050407 20260602050446 \
            20260602060958 20260602072718 20260602205733 20260602205740 \
            20260602213759 20260602233941 20260603014807 20260603014945 \
            20260603015117 20260603015244 20260603015331 20260603020436 \
            20260603021314
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy database migrations
        run: supabase db push --linked
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy process-swing --no-verify-jwt
          supabase functions deploy assign-dealer --no-verify-jwt
          supabase functions deploy close-table --no-verify-jwt
          supabase functions deploy swing-metrics --no-verify-jwt
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}

      - name: Deploy to Vercel
        run: |
          echo "DEBUG: which sh=$(which sh 2>&1 || echo NOTFOUND)"
          echo "DEBUG: ls /bin/sh=$(ls -la /bin/sh 2>&1 || echo NOTFOUND)"
          echo "DEBUG: ls /usr/bin/sh=$(ls -la /usr/bin/sh 2>&1 || echo NOTFOUND)"
          ln -sf /bin/bash /usr/local/bin/sh
          echo "DEBUG: after symlink, which sh=$(which sh 2>&1 || echo NOTFOUND)"
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token ${{ secrets.VERCELTOKEN }}
          vercel build --prod --token ${{ secrets.VERCELTOKEN }}
          vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCELTOKEN }}
        working-directory: ./VinPoker
