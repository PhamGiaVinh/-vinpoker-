name: Deploy to Production

# Workflow consolidated into user's first self-created workflow file.
# Triggers: push to main, or manual dispatch from main via Actions tab.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_db:
        description: "Run Supabase db push"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./VinPoker/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./VinPoker

      - name: Type check
        run: npm run lint
        continue-on-error: true
        working-directory: ./VinPoker

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Database migration deployment is manual-gated
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_db != 'true'
        run: echo "Skipping Supabase db push. Use workflow_dispatch deploy_db=true after migration review."

      # ⚠️ deploy_db=true applies ALL pending migrations at once (db push --include-all).
      # As of 2026-06-12 this is NOT SAFE: pending chain 20260801→20260813 must not be
      # replayed (perform_swing overload bomb in 20260812000000, da.dealers bug in
      # 20260804000000). See VinPoker/PENDING_MIGRATION_AUDIT_20260612.md. Do not enable
      # until migration reconciliation is complete and the owner explicitly approves.
      # The legacy "Repair migration history" step (revert+reapply of live-applied
      # versions) was removed 2026-06-12 — never reintroduce it.
      - name: Deploy database migrations
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_db == 'true'
        run: supabase db push --linked --include-all
        continue-on-error: true
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          deploy_func() {
            local name=$1
            local attempt=1
            while [ $attempt -le 3 ]; do
              echo "=== Deploying $name (attempt $attempt/3) ==="
              supabase functions deploy "$name" --no-verify-jwt && return 0
              echo "=== $name attempt $attempt failed ==="
              attempt=$((attempt + 1))
              [ $attempt -le 3 ] && sleep 10
            done
            return 1
          }
          # JWT-verified variant: deploy WITHOUT --no-verify-jwt so the API gateway
          # enforces the JWT. Required for functions that decode the JWT WITHOUT
          # verifying its signature and then trust `sub` (e.g. checkout-dealer);
          # deploying those with --no-verify-jwt would let a forged token pass.
          deploy_func_verify() {
            local name=$1
            local attempt=1
            while [ $attempt -le 3 ]; do
              echo "=== Deploying $name (verify_jwt, attempt $attempt/3) ==="
              supabase functions deploy "$name" && return 0
              echo "=== $name attempt $attempt failed ==="
              attempt=$((attempt + 1))
              [ $attempt -le 3 ] && sleep 10
            done
            return 1
          }
          deploy_func process-swing
          result1=$?
          deploy_func assign-dealer
          result2=$?
          deploy_func close-table
          result3=$?
          deploy_func swing-metrics
          result4=$?
          deploy_func telegram-bot
          result5=$?
          deploy_func send-shift-schedule
          result6=$?
          deploy_func td-ai-assistant
          result7=$?
          deploy_func online-poker-action
          result8=$?
          deploy_func online-poker-table-runner
          result9=$?
          deploy_func online-poker-timeout-sweep
          result10=$?
          # checkout-dealer was missing from this list, so PR #302's operator-panel
          # checkout fix (release ALL active assignments, not just 'assigned') never
          # auto-deployed. Added here — verify_jwt MUST stay on (see deploy_func_verify).
          deploy_func_verify checkout-dealer
          result11=$?
          # B1.2 — mass-assign + manage-break carry idempotency_key now but were never in this
          # list, so B1's edge wiring never deployed. deploy_func_verify (gateway enforces the JWT):
          # mass-assign decodes + trusts the JWT `sub` (forgeable under --no-verify-jwt, same class
          # as checkout-dealer); manage-break has no caller-auth, so requiring a valid JWT is the safe
          # posture (the frontend already calls both with an authenticated JWT).
          deploy_func_verify mass-assign
          result12=$?
          deploy_func_verify manage-break
          result13=$?
          # dealer-code-login: pre-auth endpoint (dealer not signed in) — trusts NO JWT, validates a
          # one-time /code login code itself, so it deploys WITHOUT verify_jwt (the code is the credential).
          deploy_func dealer-code-login
          result14=$?
          # send-shift-reminders: cron-invoked (Bearer secret, no user JWT) — same
          # posture as send-shift-schedule, deploys WITHOUT verify_jwt.
          deploy_func send-shift-reminders
          result15=$?
          # parse-dealer-list: enforces auth INSIDE (getUser + is_club_dealer_control),
          # same posture as send-shift-schedule → deploys WITHOUT verify_jwt.
          deploy_func parse-dealer-list
          result16=$?
          [ $result1 -eq 0 ] && [ $result2 -eq 0 ] && [ $result3 -eq 0 ] && [ $result4 -eq 0 ] && [ $result5 -eq 0 ] && [ $result6 -eq 0 ] && [ $result7 -eq 0 ] && [ $result8 -eq 0 ] && [ $result9 -eq 0 ] && [ $result10 -eq 0 ] && [ $result11 -eq 0 ] && [ $result12 -eq 0 ] && [ $result13 -eq 0 ] && [ $result14 -eq 0 ] && [ $result15 -eq 0 ] && [ $result16 -eq 0 ] && echo "=== All functions deployed ===" && exit 0
          echo "=== Some functions failed ===" && exit 1
        working-directory: ./VinPoker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
          cp -f .vercel/.env.production.local VinPoker/.env.production.local
          cd VinPoker
          npm install --ignore-scripts
          npm run build
          mkdir -p ../.vercel/output/static
          cp -r dist/. ../.vercel/output/static/
          printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > ../.vercel/output/config.json
          cd ..
          vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        # VITE env vars MUST be set here (process env > .env.production.local).
        # Vercel project env vars are sometimes missing after DB password changes.
        # The anon/publishable key is public (exposed in client bundle anyway).
        env:
          VITE_SUPABASE_URL: "https://orlesggcjamwuknxwcpk.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
