name: Fix register 500 — add used_free_rake column (one-shot, owner-gated)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Preflight
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/finance/apply_used_free_rake.mjs --preflight
      - name: Apply (ADD COLUMN + reload cache + verify)
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONFIRM_APPLY_USED_FREE_RAKE: APPLY_USED_FREE_RAKE
        run: node scripts/finance/apply_used_free_rake.mjs --apply
