name: Dealer teardown #299 — apply (one-shot, owner-gated)

# Manual trigger only — never runs on push. Applies migration
# 20260922000000_dealer_assignment_canonical_teardown.sql via the allowlisted
# runner: preflight (read-only snapshot) then apply (idempotent CREATE OR REPLACE)
# with post-verify. No supabase db push, no deploy_db, no schema_migrations write.
# Delete this file + branch after the apply is verified.
on:
  workflow_dispatch:

jobs:
  apply-teardown-299:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preflight — READ-ONLY (state + rollback snapshot)
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
        run: node scripts/dealer-swing/apply_teardown_299.mjs --preflight

      - name: Apply — canonical teardown + reconcile/cleanup fix, with verify
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          CONFIRM_APPLY_TEARDOWN_299: APPLY_TEARDOWN_299
        run: node scripts/dealer-swing/apply_teardown_299.mjs --apply
