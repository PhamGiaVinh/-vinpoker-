name: Dealer availability — read-only probe (one-shot, owner-gated)

# Manual trigger only — never runs on push. READ-ONLY: runs SELECT-only queries via the Management
# API to diagnose why the floor doesn't see a dealer's "xin ca" request. NO writes, NO schema change,
# NO db push, NO deploy_db. Delete this file + branch after diagnosis.
on:
  workflow_dispatch:

jobs:
  probe-dealer-availability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Probe (read-only)
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/dealer-swing/probe_dealer_availability.mjs
