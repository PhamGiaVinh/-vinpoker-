name: Dealer Swing baseline probe — A0 metrics (one-shot, read-only)

# Manual trigger only — never runs on push. Pure read-only SELECTs.
# No write, no apply, no schema_migrations, no deploy_db. Uses the GitHub
# Secret token only (never a chat-pasted token). Delete after the baseline
# is frozen into docs/dealer-swing/HARDENING_STAGE0_AND_A0A_PREFLIGHT.md.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run read-only Dealer Swing baseline probe
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
        run: node scripts/diagnostics/dealer_swing_baseline_probe.mjs
