name: Marketing — apply migrations + deploy dispatch (one-shot, owner-gated)

# Manual trigger only — never runs on push. CLICKING "Run workflow" = FULL APPLY (no field to type),
# matching the proven service-fee-apply pattern. Applies the four reviewed marketing migrations via
# the allowlisted Management-API runner (no CLI push path, no deploy_db, no schema_migrations write),
# deploys the marketing-dispatch Edge Function, dry-invokes it, then schedules the cron — in the safe
# order. Idempotent (safe to re-run). Does NOT flip any feature flag. Delete this file after the
# apply is verified.
#
# HOW TO RUN: Actions → this workflow → "Run workflow" (branch main) → Run. That's it.
# When it's green, tell the assistant "DB xong" to flip FEATURES.marketingModule (separate PR).

on:
  workflow_dispatch:

jobs:
  marketing-apply:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
      CONFIRM_APPLY_MARKETING: APPLY_MARKETING_MIGRATIONS
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preflight (read-only snapshot)
        working-directory: ./VinPoker
        run: node scripts/marketing/apply_marketing_migrations.mjs --preflight

      - name: Apply schema (enum -> role -> core)
        working-directory: ./VinPoker
        run: node scripts/marketing/apply_marketing_migrations.mjs --apply-schema

      - name: Apply telegram-dedicated (MKT-5 — chat/token + re-pointed RPCs)
        working-directory: ./VinPoker
        run: node scripts/marketing/apply_marketing_migrations.mjs --apply-telegram

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link Supabase project
        working-directory: ./VinPoker
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # verify_jwt stays ON (no --no-verify-jwt): the cron sends the project anon JWT, which is valid
      # and passes the gateway, while unauthenticated callers are rejected.
      - name: Deploy marketing-dispatch Edge Function
        working-directory: ./VinPoker
        run: supabase functions deploy marketing-dispatch

      - name: Dry-invoke (expect outcome=no_posts)
        working-directory: ./VinPoker
        run: node scripts/marketing/apply_marketing_migrations.mjs --dry-invoke

      - name: Apply cron (LAST — after dry-invoke)
        working-directory: ./VinPoker
        run: node scripts/marketing/apply_marketing_migrations.mjs --apply-cron

      - name: Done
        run: echo "Marketing backend applied + dispatch deployed + cron scheduled. Flag still OFF — tell the assistant 'DB xong' to flip FEATURES.marketingModule."
