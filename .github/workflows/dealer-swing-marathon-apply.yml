name: Dealer-swing marathon — apply migrations (one-shot, owner-gated)

# Manual trigger only — never runs on push.
# Applies the four reviewed, idempotent dealer-swing migrations via the Management API:
#   20261007 (Hardening B revoke) · 20261008 (C2 RPC) · 20261009 (B1.1 idempotency) · 20261010 (C3 metrics)
# Allowlisted runner: NO `supabase db push`, NO deploy_db, NO schema_migrations write. Preflight is
# read-only; apply is gated by the confirm env. Delete this file + branch after the apply is verified.
on:
  workflow_dispatch:

jobs:
  apply-dealer-swing-marathon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preflight — read-only (scan + PRE state)
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
        run: node scripts/dealer-swing/apply_marathon_migs.mjs --preflight

      - name: Apply — 4 idempotent migrations + post-verify + rolled-back smoke
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASEACCESSTOKEN }}
          CONFIRM_APPLY_MARATHON: APPLY_DEALER_SWING_MARATHON
        run: node scripts/dealer-swing/apply_marathon_migs.mjs --apply
