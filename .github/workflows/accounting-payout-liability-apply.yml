name: Accounting payout liability — apply migration (one-shot, owner-gated)

# Manual trigger only — never runs on push. Applies 20261216000000_accounting_payout_liability.sql
# via the Management API (NOT the CLI push path; NO schema_migrations write). Preflight is
# read-only (also verifies prerequisites: tournament_prizes.amount/position,
# tournament_entries.finished_place, tournament_close_report, club_cashiers). Apply is gated by
# the confirm env. Brings live the tournament_prize_payments ledger + get_club_payout_liability
# (read) + record_tournament_prize_payment (write). Feature stays DARK until
# FEATURES.accountingControlLivePayout is flipped (separate owner-gated commit). Delete after verified.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preflight (read-only) or apply (gated)"
        required: true
        default: preflight
        type: choice
        options: [preflight, apply]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preflight — read-only (scan + PRE state + prerequisites)
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/accounting/apply_payout_liability.mjs --preflight

      - name: Apply — ledger + RPCs + post-verify
        if: ${{ github.event.inputs.mode == 'apply' }}
        working-directory: ./VinPoker
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONFIRM_APPLY_PAYOUT_LIABILITY: APPLY_PAYOUT_LIABILITY
        run: node scripts/accounting/apply_payout_liability.mjs --apply
